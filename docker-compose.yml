services:
  grafana:
    image: grafana/grafana:11.6.0
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SERVER_DOMAIN: ${GF_DOMAIN}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL}
      GF_SERVER_HTTP_ADDR: 0.0.0.0
      GF_SERVER_HTTP_PORT: 3000
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SMTP_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v3.2.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
      - --web.listen-address=0.0.0.0:9090
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - observability

  node-exporter:
    image: prom/node-exporter:v1.9.1
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.systemd
      - --collector.processes
      - --collector.hwmon
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|snap)($|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tmpfs|tracefs)$
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro
    networks:
      - observability

  process-exporter:
    image: ncabatoff/process-exporter:v0.8.4
    restart: unless-stopped
    command:
      - --procfs
      - /host/proc
      - --config.path
      - /config/process-exporter.yml
      - --web.listen-address
      - 0.0.0.0:9256
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - ./ops/process-exporter/process-exporter.yml:/config/process-exporter.yml:ro
    networks:
      - observability

networks:
  observability:
    name: ${COMPOSE_PROJECT_NAME:-server-observability}

volumes:
  grafana-data:
    name: ${COMPOSE_PROJECT_NAME:-server-observability}-grafana-data
  prometheus-data:
    name: ${COMPOSE_PROJECT_NAME:-server-observability}-prometheus-data
