groups:
  - name: host-alerts
    rules:
      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: node-exporter is down
          description: Prometheus cannot scrape node-exporter for more than 2 minutes.

      - alert: HighCpuUsage
        expr: (100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: CPU usage is high
          description: CPU utilization has been above 90% for 10 minutes.

      - alert: HighMemoryUsage
        expr: ((1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Memory usage is high
          description: Memory utilization has been above 90% for 10 minutes.

      - alert: DiskSpaceLow
        expr: ((node_filesystem_avail_bytes{fstype!="",mountpoint!="/boot"} / node_filesystem_size_bytes{fstype!="",mountpoint!="/boot"}) * 100) < 10
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: Disk space is low
          description: A filesystem has less than 10% available space for 15 minutes.
